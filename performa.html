<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performa Live — Host</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>window.Chart&&(Chart.defaults.color='#b0aacb',Chart.defaults.borderColor='rgba(255,255,255,.07)',Chart.defaults.font.family="'Plus Jakarta Sans',sans-serif");</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f6f4ef; --surface:#fff; --surface2:#f1ede6;
    --border:#e7e2d9; --border2:#d4cdc0;
    --text:#1c1a2e; --text2:#6b6678; --text3:#a8a2b0;
    --accent:#6d28d9; --accentbg:#f3f0ff;
    --good:#16a34a; --goodbg:#f0fdf4; --goodbd:#bbf7d0;
    --warn:#d97706; --warnbg:#fffbeb; --warnbd:#fde68a;
    --bad:#dc2626; --badbg:#fef2f2; --badbd:#fecaca;
    --twilight:linear-gradient(135deg,#312e81 0%,#6d28d9 45%,#f97316 100%);
    --dusk:#1e1b3a;
    --r:12px; --rs:8px;
  }
  body { font-family:'Plus Jakarta Sans', sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; min-height:100vh; }

  /* Login */
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; background:var(--twilight); position:relative; overflow:hidden; }
  .login-wrap::before { content:''; position:absolute; width:140%; height:60%; left:-20%; bottom:-10%; background:radial-gradient(ellipse at center, rgba(251,191,36,.35), transparent 70%); pointer-events:none; }
  .login-card { background:rgba(255,255,255,.97); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.4); border-radius:20px; padding:2.5rem 2.5rem 2rem; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 60px rgba(30,27,58,.4); position:relative; z-index:1; }
  .brand-mark { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:1.5rem; }
  .brand-dot { width:34px; height:34px; border-radius:50%; background:var(--twilight); box-shadow:0 2px 12px rgba(109,40,217,.4); flex-shrink:0; }
  .brand-name { font-size:19px; font-weight:800; letter-spacing:-.02em; color:var(--text); }
  .brand-name span { background:var(--twilight); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .login-card h1 { font-size:17px; font-weight:700; margin-bottom:4px; letter-spacing:-.01em; }
  .login-card p { font-size:13px; color:var(--text2); margin-bottom:1.5rem; }
  .login-card input { width:100%; padding:12px 14px; border:1px solid var(--border2); border-radius:10px; font-size:14px; margin-bottom:11px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text); outline:none; transition:border-color .15s, box-shadow .15s; }
  .login-card input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accentbg); }
  .btn-primary { width:100%; padding:12px; background:var(--twilight); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; box-shadow:0 4px 14px rgba(109,40,217,.3); transition:transform .1s, box-shadow .15s; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(109,40,217,.4); }
  .msg { display:none; margin-top:12px; font-size:13px; }

  /* App shell */
  .app { display:none; max-width:920px; margin:0 auto; padding:1.5rem 1.5rem 4rem; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; padding-bottom:1.2rem; border-bottom:1px solid var(--border); }
  .topbar h1 { font-size:19px; font-weight:800; letter-spacing:-.02em; }
  .topbar p { font-size:13px; color:var(--text2); margin-top:2px; }
  .topbar-actions { display:flex; gap:8px; align-items:center; }
  .btn-ghost { padding:6px 14px; border-radius:20px; border:1px solid var(--border2); background:var(--surface); font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text2); text-decoration:none; }
  .btn-ghost:hover { background:var(--surface2); }

  /* Tabs */
  .tabs { display:flex; gap:6px; margin-bottom:1.3rem; flex-wrap:wrap; }
  .tab { padding:8px 18px; border-radius:20px; border:1px solid var(--border2); background:var(--surface); font-size:13px; font-weight:600; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text2); transition:.15s; }
  .tab:hover { border-color:var(--accent); color:var(--accent); }
  .tab.active { background:var(--twilight); color:#fff; border-color:transparent; box-shadow:0 2px 10px rgba(109,40,217,.3); }
  .panel { display:none; }
  .panel.active { display:block; }

  /* Form */
  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.5rem; margin-bottom:1rem; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .fg { display:flex; flex-direction:column; }
  .fg.full { grid-column:1 / -1; }
  .fg label { font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .fg input, .fg select { width:100%; padding:9px 12px; border:1px solid var(--border2); border-radius:var(--rs); font-size:13px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text); background:var(--surface); outline:none; }
  .fg input:focus, .fg select:focus { border-color:var(--accent); }
  .group-label { font-size:12px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin:16px 0 4px; grid-column:1 / -1; }
  .group-label:first-child { margin-top:0; }
  .hint { font-size:11px; color:var(--text3); margin-top:3px; }

  /* Calc preview */
  .calc-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--border2); grid-column:1 / -1; }
  .calc { background:var(--surface2); border-radius:var(--rs); padding:8px 10px; text-align:center; }
  .calc-l { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
  .calc-v { font-size:14px; font-weight:600; color:var(--text); margin-top:2px; }

  /* Stats */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.3rem; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:13px 15px; text-align:center; }
  .stat-l { font-size:10.5px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .stat-v { font-size:19px; font-weight:600; color:var(--text); letter-spacing:-.02em; }
  .stat-v.good{color:var(--good);} .stat-v.warn{color:var(--warn);} .stat-v.bad{color:var(--bad);}
  .grp-head { font-size:12px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin:0 0 8px 2px; }
  .menu-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; cursor:pointer; transition:border-color .15s, transform .1s; display:block; }
  .menu-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .menu-ic { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:10px; }
  .menu-t { font-size:14px; font-weight:600; margin-bottom:2px; }
  .menu-s { font-size:12px; color:var(--text3); }

  /* Chart card */
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:1.3rem; }
  .chart-card h3 { font-size:13px; font-weight:500; margin-bottom:14px; }
  .chart-wrap { height:200px; position:relative; }
  .chart-wrap.sm { height:150px; }

  /* Table */
  .tbl-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:1.3rem; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { background:var(--surface2); text-align:left; padding:9px 11px; font-weight:600; color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; border-bottom:1px solid var(--border); }
  td { padding:9px 11px; border-bottom:1px solid var(--border); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .tbl-scroll { overflow-x:auto; }
  .num { text-align:right; font-variant-numeric:tabular-nums; }

  /* Brand badge */
  .badge { display:inline-block; font-size:10px; font-weight:500; padding:2px 8px; border-radius:10px; background:var(--accentbg); color:var(--accent); }

  /* Import */
  .drop { border:2px dashed var(--border2); border-radius:var(--r); padding:2.5rem; text-align:center; background:var(--surface); cursor:pointer; transition:border-color .15s; }
  .drop:hover { border-color:var(--accent); }
  .drop.over { border-color:var(--accent); background:var(--accentbg); }
  .drop-icon { font-size:32px; margin-bottom:8px; }
  .drop-t { font-size:14px; font-weight:500; margin-bottom:3px; }
  .drop-s { font-size:12px; color:var(--text3); }

  /* Misc */
  .empty { text-align:center; padding:3rem 0; color:var(--text3); font-size:13px; }
  .toast { position:fixed; bottom:24px; right:24px; padding:12px 18px; border-radius:var(--r); font-size:13px; font-weight:500; border:1px solid var(--border); background:var(--surface); box-shadow:0 4px 16px rgba(0,0,0,.1); z-index:9999; opacity:0; transform:translateY(8px); transition:.2s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { background:var(--goodbg); border-color:var(--goodbd); color:var(--good); }
  .toast.error { background:var(--badbg); border-color:var(--badbd); color:var(--bad); }
  .btn-accent { padding:10px 20px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); font-size:13px; font-weight:500; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; }
  .btn-accent:hover { background:#333; }
  .btn-accent:disabled { opacity:.5; cursor:not-allowed; }
  .filter-row { display:flex; gap:10px; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
  .filter-row select { padding:7px 10px; border:1px solid var(--border2); border-radius:var(--rs); font-size:13px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text); background:var(--surface); outline:none; }
  .plat-toggle { display:inline-flex; gap:4px; padding:4px; background:var(--surface); border:1px solid var(--border2); border-radius:999px; margin-bottom:1rem; }
  .pt-btn { padding:6px 16px; border:none; background:transparent; color:var(--text2); font-size:13px; font-weight:600; font-family:'Plus Jakarta Sans',sans-serif; border-radius:999px; cursor:pointer; transition:all .15s; }
  .pt-btn:hover { color:var(--text); }
  .pt-btn.active { background:linear-gradient(135deg,#7c4dd6,#b4451a); color:#fff; }
  .section-title { font-size:15px; font-weight:600; margin-bottom:1rem; }

  @media (max-width:600px){
    .form-grid{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;}
    .calc-row{grid-template-columns:1fr;}
  }

  /* ════════ SENJA — DUSK THEME (langit malam, sisa cahaya jingga di horizon) ════════ */
  :root{
    --bg:#0d0c17; --surface:#17152a; --surface2:#211e3a;
    --border:#2a2742; --border2:#3a3658;
    --text:#f1eefb; --text2:#b0aacb; --text3:#76709a;
    --accent:#a78bfa; --accent-bg:rgba(167,139,250,.13); --accentbg:rgba(167,139,250,.13);
    --good:#4ade80; --good-bg:rgba(74,222,128,.13); --goodbg:rgba(74,222,128,.13);
    --good-border:rgba(74,222,128,.32); --goodbd:rgba(74,222,128,.32);
    --warn:#fbbf24; --warn-bg:rgba(251,191,36,.13); --warnbg:rgba(251,191,36,.13);
    --warn-border:rgba(251,191,36,.32); --warnbd:rgba(251,191,36,.32);
    --bad:#fb7185; --bad-bg:rgba(251,113,133,.13); --badbg:rgba(251,113,133,.13);
    --bad-border:rgba(251,113,133,.32); --badbd:rgba(251,113,133,.32);
    --star-on:#fbbf24; --star-off:#272343;
    --twilight:linear-gradient(135deg,#3b2f9e 0%,#6d28d9 45%,#f97316 100%);
    --dusk:#17152a;
  }
  html{ color-scheme:dark; scrollbar-color:#322e4e transparent; }
  body{ background:
    radial-gradient(1100px 480px at 88% -8%, rgba(109,40,217,.16), transparent 60%),
    radial-gradient(900px 420px at 6% 4%, rgba(249,115,22,.07), transparent 55%),
    var(--bg); background-attachment:fixed; }
  ::selection{ background:rgba(167,139,250,.35); color:#fff; }
  ::-webkit-scrollbar{ width:11px; height:11px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#322e4e; border-radius:9px; border:3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:#473f6b; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  /* numeric signature face — uang & skor yang paling sering dilihat tim */
  .brand-name,.hero-num,.stat-v,.stat-value,.host-score,.eval-score,.section-avg,.calc-v{
    font-family:'Space Grotesk','Plus Jakarta Sans',sans-serif; font-feature-settings:'tnum' 1; }
  /* login jadi kaca gelap di atas horizon senja */
  .login-card{ background:rgba(20,18,38,.66)!important; border:1px solid rgba(167,139,250,.22)!important;
    box-shadow:0 26px 70px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05)!important; }
  .login-card input{ background:rgba(10,9,20,.55); }
  .login-card input::placeholder{ color:var(--text3); }
  .login-wrap::before{ opacity:.85; }
  /* tombol aksi pakai gradient senja (sebelumnya pakai --text yang kini terang) */
  .btn-accent{ background:var(--twilight)!important; color:#fff!important; border:none!important;
    box-shadow:0 6px 18px rgba(109,40,217,.32); }
  .btn-accent:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  /* row actions + edit modal */
  .row-btn{ background:transparent; border:1px solid var(--border2); border-radius:7px; padding:3px 7px;
    font-size:13px; cursor:pointer; line-height:1; margin-right:5px; transition:.12s; }
  .row-btn:hover{ border-color:var(--accent); background:var(--accent-bg); transform:translateY(-1px); }
  .row-btn.del:hover{ border-color:var(--bad); background:var(--bad-bg); }
  .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(5,4,12,.66); backdrop-filter:blur(3px);
    z-index:200; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--surface); border:1px solid var(--border2); border-radius:16px; width:100%;
    max-width:560px; max-height:88vh; display:flex; flex-direction:column; box-shadow:0 28px 80px rgba(0,0,0,.6); }
  .modal-top{ display:flex; justify-content:space-between; align-items:center; padding:16px 20px;
    border-bottom:1px solid var(--border); }
  .modal-h{ font-size:15px; font-weight:700; letter-spacing:-.01em; }
  .modal-x{ background:none; border:none; font-size:22px; line-height:1; cursor:pointer; color:var(--text2); padding:2px 6px; }
  .modal-x:hover{ color:var(--text); }
  .modal-content{ padding:18px 20px; overflow-y:auto; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 20px; border-top:1px solid var(--border); }
  /* screenshot upload + viewer */
  .ss-drop{ border:2px dashed var(--border2); border-radius:var(--r); padding:22px; text-align:center; cursor:pointer; transition:.15s; }
  .ss-drop:hover{ border-color:var(--accent); background:var(--accent-bg); }
  .ss-drop.over{ border-color:var(--accent); background:var(--accent-bg); }
  .ss-view-overlay{ display:none; position:fixed; inset:0; background:rgba(3,2,9,.82); backdrop-filter:blur(4px); z-index:300; align-items:center; justify-content:center; padding:24px; }
  .ss-view-overlay.open{ display:flex; }
  .ss-view-overlay img{ max-width:94vw; max-height:88vh; border-radius:12px; box-shadow:0 30px 90px rgba(0,0,0,.7); }
  .ss-view-x{ position:absolute; top:16px; right:20px; background:rgba(23,21,42,.8); border:1px solid var(--border2); color:var(--text); font-size:22px; line-height:1; width:40px; height:40px; border-radius:50%; cursor:pointer; }
  .ss-thumb{ display:inline-block; height:46px; border-radius:6px; border:1px solid var(--border2); vertical-align:middle; cursor:pointer; }
  @media (prefers-reduced-motion:reduce){ *{ transition:none!important; animation:none!important; } }

  .hero{ box-shadow:0 14px 40px rgba(0,0,0,.45)!important; border:1px solid rgba(167,139,250,.18)!important; }
  .hero::after{ content:''; position:absolute; left:-12%; bottom:-65%; width:72%; height:150%;
    background:radial-gradient(ellipse at center, rgba(251,191,36,.30), transparent 62%); pointer-events:none; }
  .hero-num{ font-size:38px!important; }
  .menu-card:hover{ box-shadow:0 8px 22px rgba(0,0,0,.4); }

</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="brand-mark">
      <div class="brand-dot"></div>
      <div class="brand-name">Senja <span>Studio</span></div>
    </div>
    <h1>Performa &amp; Evaluasi Host</h1>
    <p>Masuk dengan email &amp; password kamu</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="pass" placeholder="Password" />
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Masuk</button>
    <p class="msg" id="loginMsg"></p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:11px">
      <div class="brand-dot" style="width:30px;height:30px"></div>
      <div>
        <h1 id="greeting">Performa Live</h1>
        <p id="subtitle"></p>
      </div>
    </div>
    <div class="topbar-actions" id="topActions"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<div class="toast" id="toast"></div>

<!-- SCREENSHOT VIEWER -->
<div class="ss-view-overlay" id="ssView" onclick="if(event.target.id==='ssView')closeSS()">
  <button class="ss-view-x" onclick="closeSS()" title="Tutup">×</button>
  <img id="ssViewImg" alt="screenshot dashboard" />
</div>

<!-- EDIT SESI MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-top">
      <span class="modal-h">Edit Sesi</span>
      <button class="modal-x" onclick="closeEditModal()" title="Tutup">×</button>
    </div>
    <div class="modal-content">
      <div class="form-grid">
        <div class="fg"><label>Platform</label><select id="e_platform" onchange="applyEditPlatform()">
          <option value="tiktok">TikTok</option>
          <option value="shopee">Shopee</option>
        </select></div>
        <div class="fg"><label>Tanggal</label><input type="date" id="e_tanggal" /></div>
        <div class="fg"><label>Sesi</label><select id="e_sesi">
          <option value="1">Sesi 1 (07:00–10:00)</option>
          <option value="2">Sesi 2 (11:00–14:00)</option>
          <option value="3">Sesi 3 (14:30–17:30)</option>
          <option value="4">Sesi 4 (18:30–21:30)</option>
        </select></div>
        <div class="fg"><label>GMV (Rp)</label><input type="number" id="e_gmv" placeholder="0" /></div>
        <div class="fg"><label>Pembeli</label><input type="number" id="e_pembeli" placeholder="0" /></div>
        <div class="fg"><label>Items Sold</label><input type="number" id="e_items" placeholder="0" /></div>
        <div class="fg"><label>Durasi live</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" id="e_durasi_jam" placeholder="0" min="0" style="width:64px" />
            <span class="hint" style="margin:0">jam</span>
            <input type="number" id="e_durasi_min" placeholder="0" min="0" max="59" style="width:64px" />
            <span class="hint" style="margin:0">menit</span>
          </div>
        </div>
        <div class="fg"><label>Viewers</label><input type="number" id="e_viewers" placeholder="0" /></div>
        <div class="fg" id="fg_e_impresi"><label>Impresi</label><input type="number" id="e_impresi" placeholder="0" /></div>
        <div class="fg"><label>Klik Produk</label><input type="number" id="e_klik" placeholder="0" /></div>
        <div class="fg" id="fg_e_atc" style="display:none"><label>ATC <span class="hint" style="display:inline;margin:0">(Add to Cart)</span></label><input type="number" id="e_atc" placeholder="0" /></div>
        <div class="fg"><label>Avg View Dur (dtk)</label><input type="number" id="e_avg" placeholder="0" /></div>
        <div class="fg"><label>Followers Baru</label><input type="number" id="e_foll" placeholder="0" /></div>
        <div class="fg"><label>Likes</label><input type="number" id="e_likes" placeholder="0" /></div>
        <div class="fg"><label>Komentar</label><input type="number" id="e_kom" placeholder="0" /></div>
        <div class="fg"></div>
        <div class="fg full"><label>Screenshot Dashboard</label>
          <div id="e_ss_current" style="margin-bottom:8px"></div>

// ── Screenshot (kompres di browser + upload ke Supabase Storage) ──
const SS_BUCKET='screenshots';
function compressImage(file, maxW=1280, quality=0.7){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth, h=img.naturalHeight;
      if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=> b? resolve(b) : reject(new Error('kompres gagal')), 'image/jpeg', quality);
      URL.revokeObjectURL(img.src);
    };
    img.onerror=()=>reject(new Error('file bukan gambar yang valid'));
    img.src=URL.createObjectURL(file);
  });
}
async function uploadScreenshot(file, email, tanggal, sesi){
  const blob=await compressImage(file);
  const safe=String(email).replace(/[^a-z0-9]/gi,'_');
  const path=`${safe}/${tanggal}_s${sesi}_${Date.now()}.jpg`;
  const {error}=await sb.storage.from(SS_BUCKET).upload(path, blob, {contentType:'image/jpeg'});
  if(error) throw error;
  return sb.storage.from(SS_BUCKET).getPublicUrl(path).data.publicUrl;
}
function setupSSInput(fileId, dropId, promptId, previewId){
  const inp=document.getElementById(fileId), drop=document.getElementById(dropId);
  if(!inp||!drop) return;
  const show=f=>{
    const prev=document.getElementById(previewId), pr=document.getElementById(promptId);
    if(f){ prev.src=URL.createObjectURL(f); prev.style.display='block'; if(pr)pr.style.display='none'; }
    else { prev.style.display='none'; if(pr)pr.style.display='block'; }
  };
  drop.onclick=()=>inp.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f){inp.files=e.dataTransfer.files;show(f);}};
  inp.onchange=()=>show(inp.files[0]);
}
function resetSSInput(fileId, promptId, previewId){
  const inp=document.getElementById(fileId); if(inp) inp.value='';
  const prev=document.getElementById(previewId), pr=document.getElementById(promptId);
  if(prev){ prev.style.display='none'; prev.removeAttribute('src'); }
  if(pr) pr.style.display='block';
}

// ── Paste screenshot from clipboard (Ctrl+V) ──
function setSSFromBlob(blob, fileId, promptId, previewId){
  const inp=document.getElementById(fileId);
  if(!inp) return false;
  const file=new File([blob], 'pasted_'+Date.now()+'.png', {type:blob.type||'image/png'});
  try{ const dt=new DataTransfer(); dt.items.add(file); inp.files=dt.files; }
  catch(e){ showToast('Browser tidak mendukung paste. Pakai klik/drag ya.','error'); return false; }
  const prev=document.getElementById(previewId), pr=document.getElementById(promptId);
  if(prev){ prev.src=URL.createObjectURL(file); prev.style.display='block'; }
  if(pr) pr.style.display='none';
  return true;
}
function handleSSPaste(e){
  const items=(e.clipboardData||window.clipboardData)?.items;
  if(!items) return;
  let blob=null;
  for(const it of items){ if(it.type && it.type.indexOf('image')===0){ blob=it.getAsFile(); break; } }
  if(!blob) return;  // not an image — let normal paste happen (e.g. text into a field)
  // Route to whichever screenshot input is currently active
  let ok=false;
  if(document.getElementById('editModal')?.classList.contains('open')){
    ok=setSSFromBlob(blob,'e_ss_file','e_ss_prompt','e_ss_preview');
  } else if(document.getElementById('f_ss_drop') && document.getElementById('f_ss_drop').offsetParent!==null){
    ok=setSSFromBlob(blob,'f_ss_file','f_ss_prompt','f_ss_preview');
  }
  if(ok){ e.preventDefault(); showToast('Screenshot ditempel. Tinggal simpan.','success'); }
}
document.addEventListener('paste', handleSSPaste);

async function submitPerforma(){
  const me=HOST_MAP[ME];
  const v=id=>document.getElementById(id).value;
  const n=id=>+document.getElementById(id).value||0;
  if(!v('f_tanggal')){alert('Pilih tanggal dulu.');return;}
  if(n('f_gmv')===0 && n('f_viewers')===0){alert('Minimal isi GMV atau Viewers.');return;}
  let screenshot_url=null;
  const ssFile=document.getElementById('f_ss_file')?.files[0];
  if(ssFile){
    try{ showToast('Mengupload screenshot...','info'); screenshot_url=await uploadScreenshot(ssFile, ME, v('f_tanggal'), v('f_sesi')); }
    catch(err){ showToast('Gagal upload screenshot: '+(err.message||err),'error'); return; }
  }
  const payload={
    host:me.name, brand:me.brand, host_email:ME,
    tanggal:v('f_tanggal'), sesi:+v('f_sesi'),
    platform:v('f_platform')||'tiktok',
    gmv:n('f_gmv'), pembeli:n('f_pembeli'), items:n('f_items'),
    viewers:n('f_viewers'), impresi:n('f_impresi'), klik_produk:n('f_klik'), atc:n('f_atc'),
    avg_view_dur:n('f_avg'), durasi_menit:n('f_durasi_jam')*60+n('f_durasi_min'),
    followers_baru:n('f_foll'), likes:n('f_likes'), komentar:n('f_kom'),
    screenshot_url,
  };
  const {error}=await sb.from('live_performance').insert([payload]);
  if(error){showToast('Gagal: '+error.message,'error');return;}
  showToast('Data sesi tersimpan!','success');
  ['f_gmv','f_pembeli','f_items','f_viewers','f_impresi','f_klik','f_atc','f_avg','f_durasi_jam','f_durasi_min','f_foll','f_likes','f_kom'].forEach(id=>document.getElementById(id).value='');
  resetSSInput('f_ss_file','f_ss_prompt','f_ss_preview');
  updateCalc();
  loadHostData();
}

// Shared performance view with month filter (host's own, or leader drilldown)
function renderPerformanceView(box, allData, label, ctx){
  ctx = ctx || ('pv_'+Math.random().toString(36).slice(2,8));
  // collect months present
  const months=[...new Set(allData.filter(r=>r.tanggal).map(r=>r.tanggal.slice(0,7)))].sort().reverse();
  const monthOpts=`<option value="">Semua bulan</option>`+months.map(m=>{const[y,mo]=m.split('-');return `<option value="${m}">${new Date(y,mo-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</option>`}).join('');
  box.innerHTML = `${platToggle()}<div class="filter-row"><label style="font-size:13px;color:var(--text2)">Periode:</label>
    <select id="mf_${ctx}">${monthOpts}</select></div><div id="body_${ctx}"></div>`;
  // stash data on the select for re-render
  const sel=document.getElementById('mf_'+ctx);
  sel.onchange=()=>renderPerfBody(ctx, allData, label, sel.value);
  renderPerfBody(ctx, allData, label, '');
}

function renderPerfBody(ctx, allData, label, month){
  const data = platFilter(month? allData.filter(r=>r.tanggal&&r.tanggal.startsWith(month)) : allData);
  const box=document.getElementById('body_'+ctx);
  if(!data.length){ box.innerHTML='<p class="empty">Tidak ada data di periode / platform ini.</p>'; return; }
  const tot = data.reduce((a,r)=>{a.gmv+=+r.gmv||0;a.pembeli+=+r.pembeli||0;a.items+=+r.items||0;a.viewers+=+r.viewers||0;a.impresi+=+r.impresi||0;a.klik+=+r.klik_produk||0;a.atc+=+r.atc||0;a.likes+=+r.likes||0;a.kom+=+r.komentar||0;a.foll+=+r.followers_baru||0;return a;},{gmv:0,pembeli:0,items:0,viewers:0,impresi:0,klik:0,atc:0,likes:0,kom:0,foll:0});
  const dTot = derive({gmv:tot.gmv,pembeli:tot.pembeli,impresi:tot.impresi,klik_produk:tot.klik,viewers:tot.viewers,likes:tot.likes,komentar:tot.kom,durasi_menit:0});
  const closing = data.filter(r=>(+r.gmv||0)>0).length;
  const totVwDur = data.reduce((a,r)=>a+((+r.avg_view_dur||0)*(+r.viewers||0)),0);
  const avgDur = tot.viewers? totVwDur/tot.viewers : 0;
  const N = n => (n||0).toLocaleString('id-ID');
  const isS = PLAT_VIEW==='shopee', isAll = PLAT_VIEW==='all';
  // Traffic: TikTok pakai Impresi; Shopee pakai ATC; Gabungan tampilkan dua-duanya ringkas
  const trafficThird = isS
    ? `<div class="stat"><div class="stat-l">ATC</div><div class="stat-v">${N(tot.atc)}</div></div>`
    : `<div class="stat"><div class="stat-l">Impresi</div><div class="stat-v">${N(tot.impresi)}</div></div>`;
  // Konversi per platform
  const convCells = isAll
    ? `<div class="stat"><div class="stat-l">AOV</div><div class="stat-v">${rp(dTot.aov)}</div></div>
       <div class="stat"><div class="stat-l">Engagement</div><div class="stat-v">${pct(dTot.eng)}</div></div>
       <div class="stat" style="visibility:hidden"></div><div class="stat" style="visibility:hidden"></div>`
    : isS
    ? `<div class="stat"><div class="stat-l">AOV</div><div class="stat-v">${rp(dTot.aov)}</div></div>
       <div class="stat"><div class="stat-l">Klik/Viewer</div><div class="stat-v">${tot.klik?pct(dTot.klik_per_viewer):'—'}</div></div>
       <div class="stat"><div class="stat-l">CTOR</div><div class="stat-v">${tot.klik?pct(dTot.ctor):'—'}</div></div>
       <div class="stat"><div class="stat-l">Engagement</div><div class="stat-v">${pct(dTot.eng)}</div></div>`
    : `<div class="stat"><div class="stat-l">AOV</div><div class="stat-v">${rp(dTot.aov)}</div></div>
       <div class="stat"><div class="stat-l">CTR LIVE</div><div class="stat-v">${pct(dTot.ctr)}</div></div>
       <div class="stat"><div class="stat-l">CTOR</div><div class="stat-v">${pct(dTot.ctor)}</div></div>
       <div class="stat"><div class="stat-l">GPM</div><div class="stat-v">${rp(dTot.gpm)}</div></div>`;
  const convSecond = isAll||isS
    ? ``
    : `<div class="stats" style="margin-bottom:1.3rem">
        <div class="stat"><div class="stat-l">Engagement</div><div class="stat-v">${pct(dTot.eng)}</div></div>
        <div class="stat" style="visibility:hidden"></div><div class="stat" style="visibility:hidden"></div><div class="stat" style="visibility:hidden"></div>
      </div>`;

  box.innerHTML = `
    <div class="grp-head">Revenue</div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Total GMV</div><div class="stat-v good">${rp(tot.gmv)}</div></div>
      <div class="stat"><div class="stat-l">Sesi</div><div class="stat-v">${data.length}<span style="font-size:12px;color:var(--text3)"> · ${closing} closing</span></div></div>
      <div class="stat"><div class="stat-l">Total Pembeli</div><div class="stat-v">${N(tot.pembeli)}</div></div>
      <div class="stat"><div class="stat-l">Items Sold</div><div class="stat-v">${N(tot.items)}</div></div>
    </div>
    <div class="grp-head">Traffic</div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Viewers</div><div class="stat-v">${N(tot.viewers)}</div></div>
      ${trafficThird}
      <div class="stat"><div class="stat-l">Klik Produk</div><div class="stat-v">${N(tot.klik)}</div></div>
      <div class="stat"><div class="stat-l">Avg View Dur</div><div class="stat-v">${avgDur.toFixed(1)}<span style="font-size:12px;color:var(--text3)"> dtk</span></div></div>
    </div>
    <div class="grp-head">Engagement</div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Followers Baru</div><div class="stat-v">${N(tot.foll)}</div></div>
      <div class="stat"><div class="stat-l">Likes</div><div class="stat-v">${N(tot.likes)}</div></div>
      <div class="stat"><div class="stat-l">Komentar</div><div class="stat-v">${N(tot.kom)}</div></div>
      <div class="stat"><div class="stat-l">Items / Sesi</div><div class="stat-v">${data.length?(tot.items/data.length).toFixed(1):'0'}</div></div>
    </div>
    <div class="grp-head">Metrik Konversi (dihitung otomatis) · ${PLAT_LABEL[PLAT_VIEW]}</div>
    <div class="stats">
      ${convCells}
    </div>
    ${convSecond}
    <div class="chart-card"><h3>Tren GMV per sesi (urut waktu)</h3><div class="chart-wrap"><canvas id="chGmv_${ctx}"></canvas></div></div>
    <div class="chart-card"><h3>GMV per sesi (rata-rata sesi 1–4)</h3><div class="chart-wrap sm"><canvas id="chSesi_${ctx}"></canvas></div></div>
    <div class="section-title">Riwayat Sesi</div>
    <div class="tbl-wrap"><div class="tbl-scroll"><table>
      <thead><tr><th>Aksi</th><th>Tgl</th><th>Sesi</th><th>Plat</th><th class="num">GMV</th><th class="num">Pembeli</th><th class="num">Items</th><th class="num">Viewers</th><th class="num">Impresi</th><th class="num">Klik</th><th class="num">AvgDur</th><th class="num">Follow</th><th class="num">Likes</th><th class="num">Komen</th><th class="num">CTR</th><th class="num">CTOR</th><th class="num">GPM</th><th class="num">Eng</th><th class="num">SS</th></tr></thead>
      <tbody>${[...data].reverse().map(r=>{const d=derive(r);const sh=platOf(r)==='shopee';return `<tr>
        <td style="white-space:nowrap"><button class="row-btn" onclick="openEditSesi('${r.id}')" title="Edit sesi">✏️</button>${ROLE==='leader'?`<button class="row-btn del" onclick="deleteSesi('${r.id}')" title="Hapus sesi">🗑️</button>`:''}</td>
        <td>${fmtTgl(r.tanggal)}</td><td>S${r.sesi}</td>
        <td title="${sh?'Shopee':'TikTok'}">${sh?'🛒':'🎵'}</td>
        <td class="num">${rp(+r.gmv||0)}</td><td class="num">${r.pembeli||0}</td><td class="num">${r.items||0}</td>
        <td class="num">${(r.viewers||0).toLocaleString('id-ID')}</td><td class="num">${sh?'—':(r.impresi||0).toLocaleString('id-ID')}</td><td class="num">${r.klik_produk||0}</td>
        <td class="num">${(+r.avg_view_dur||0).toFixed(0)}</td><td class="num">${r.followers_baru||0}</td><td class="num">${(r.likes||0).toLocaleString('id-ID')}</td><td class="num">${r.komentar||0}</td>
        <td class="num">${sh?(r.viewers&&r.klik_produk?pct(d.klik_per_viewer):'—'):(r.impresi?pct(d.ctr):'—')}</td><td class="num">${r.klik_produk?pct(d.ctor):'—'}</td>
        <td class="num">${sh?'—':(r.impresi?rp(d.gpm):'—')}</td><td class="num">${r.viewers?pct(d.eng):'—'}</td>
        <td class="num">${r.screenshot_url?`<button class="row-btn" onclick="viewScreenshot('${r.screenshot_url}')" title="Lihat screenshot">📷</button>`:'<span style="color:var(--text3)">—</span>'}</td>
      </tr>`}).join('')}</tbody>
    </table></div></div>`;

  destroyCharts();
  // GMV trend
  charts.gmv = new Chart(document.getElementById('chGmv_'+ctx),{type:'line',data:{
    labels:data.map((r,i)=>fmtTgl(r.tanggal)+' S'+r.sesi),
    datasets:[{data:data.map(r=>+r.gmv||0),borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,.15)',tension:.3,pointRadius:2,fill:true}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{callback:v=>'Rp'+(v/1000)+'k',font:{size:10}},grid:{color:'rgba(255,255,255,.07)'}}}}});
  // Avg per sesi
  const bySesi=[1,2,3,4].map(s=>{const ss=data.filter(r=>+r.sesi===s);return ss.length? ss.reduce((a,r)=>a+(+r.gmv||0),0)/ss.length : 0;});
  charts.sesi = new Chart(document.getElementById('chSesi_'+ctx),{type:'bar',data:{
    labels:['Sesi 1','Sesi 2','Sesi 3','Sesi 4'],
    datasets:[{data:bySesi,backgroundColor:['#93c5fd','#818cf8','#a78bfa','#f0a868'],borderRadius:5}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rp'+(v/1000)+'k',font:{size:10}},grid:{color:'rgba(255,255,255,.07)'}},x:{grid:{display:false}}}}});
}

function goLeaderTab(panelId, tabIdx){
  const tabs=document.querySelectorAll('#tabs .tab');
  tabs.forEach((t,i)=>t.classList.toggle('active', i===tabIdx));

    const funnel = PLAT_VIEW==='shopee'
      ? `<span>Klik/Vw ${vw&&kl?pct(dd.klik_per_viewer):'—'}</span><span>CTOR ${kl?pct(dd.ctor):'—'}</span>`
      : PLAT_VIEW==='tiktok'
      ? `<span>CTR ${imp?pct(dd.ctr):'—'}</span><span>CTOR ${kl?pct(dd.ctor):'—'}</span>`
      : ``;
    return `<div class="tbl-wrap" style="padding:14px 16px;margin-bottom:8px;cursor:pointer" onclick="drilldown('${h.email}','${h.name}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><b>${h.name}</b> <span class="badge">${h.brand}</span></div>
        <div style="font-size:18px;font-weight:600;color:var(--good)">${rp(g)}</div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text2);flex-wrap:wrap">
        <span>${hd.length} sesi</span><span>${p.toLocaleString('id-ID')} pembeli</span><span>${it.toLocaleString('id-ID')} items</span><span>${vw.toLocaleString('id-ID')} viewers</span><span>AOV ${rp(dd.aov)}</span>${funnel}
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Klik untuk lihat detail lengkap →</div>
    </div>`;
  }).join('');
  document.getElementById('hostCards').innerHTML=cards;

  // compare chart
  destroyCharts();
  const cmpHosts=hosts.map(h=>({h, g:filtered.filter(r=>r.host_email===h.email).reduce((a,r)=>a+(+r.gmv||0),0)}));
  charts.cmp=new Chart(document.getElementById('chCompare'),{type:'bar',data:{
    labels:cmpHosts.map(x=>x.h.name),
    datasets:[{data:cmpHosts.map(x=>x.g),backgroundColor:cmpHosts.map(x=>x.h.color),borderRadius:5}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rp'+(v/1e6).toFixed(1)+'jt',font:{size:10}},grid:{color:'rgba(255,255,255,.07)'}},x:{grid:{display:false}}}}});
}

// BANDINGKAN HOST (per brand, jumlah host dinamis, pilih bulan)
// ════════════════════════════════════
function renderCompare(){
  const box=document.getElementById('compareContent');
  if(!box) return;

  const curBrand=document.getElementById('cmpBrand')?.value || 'Onebear';

  const months=[...new Set(allPerf.filter(r=>r.brand===curBrand&&r.tanggal).map(r=>r.tanggal.slice(0,7)))].sort().reverse();
  const thisMonth=new Date().toISOString().slice(0,7);
  const savedM=document.getElementById('cmpMonth')?.value;
  let curMonth;
  if(savedM===undefined) curMonth = months.includes(thisMonth)?thisMonth:(months[0]||'');
  else if(savedM!=='' && !months.includes(savedM)) curMonth = months.includes(thisMonth)?thisMonth:(months[0]||'');
  else curMonth = savedM;

  const monthOpts=`<option value="" ${curMonth===''?'selected':''}>Semua bulan (akumulasi)</option>`+
    months.map(m=>{const[y,mo]=m.split('-');return `<option value="${m}" ${m===curMonth?'selected':''}>${new Date(y,mo-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</option>`}).join('');

  const periodLbl = curMonth==='' ? 'Akumulasi semua bulan' : (()=>{const[y,mo]=curMonth.split('-');return new Date(y,mo-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})})();

  const hosts=ALL_HOSTS.filter(h=>h.brand===curBrand);
  const rowsData=platFilter(allPerf.filter(r=>r.brand===curBrand && (!curMonth || (r.tanggal&&r.tanggal.startsWith(curMonth)))));

  const hd=hosts.map(h=>{
    const hr=rowsData.filter(r=>r.host_email===h.email);
    if(!hr.length) return {h, none:true};
    const s=hr.reduce((a,r)=>{a.gmv+=+r.gmv||0;a.pembeli+=+r.pembeli||0;a.items+=+r.items||0;a.vw+=+r.viewers||0;a.imp+=+r.impresi||0;a.kl+=+r.klik_produk||0;a.likes+=+r.likes||0;a.kom+=+r.komentar||0;return a;},{gmv:0,pembeli:0,items:0,vw:0,imp:0,kl:0,likes:0,kom:0});
    const d=derive({gmv:s.gmv,pembeli:s.pembeli,impresi:s.imp,klik_produk:s.kl,viewers:s.vw,likes:s.likes,komentar:s.kom,durasi_menit:0});
    return {h, none:false, sesi:hr.length, gmv:s.gmv, pembeli:s.pembeli, items:s.items, viewers:s.vw,
            aov:d.aov, ctr:d.ctr, ctor:d.ctor, eng:d.eng, kpv:d.klik_per_viewer};
  });

  const withData=hd.filter(x=>!x.none);

  let html=`
    ${platToggle()}
    <div class="filter-row">
      <select id="cmpBrand" onchange="renderCompare()">
        <option value="Onebear" ${curBrand==='Onebear'?'selected':''}>Onebear</option>
        <option value="Supoe" ${curBrand==='Supoe'?'selected':''}>Supoe</option>
        <option value="Momso" ${curBrand==='Momso'?'selected':''}>Momso</option>
      </select>
      <select id="cmpMonth" onchange="renderCompare()">${monthOpts}</select>
    </div>
    <div class="section-title">Bandingkan Host — ${curBrand}</div>
    <div style="font-size:12px;color:var(--text3);margin:-6px 0 12px">${periodLbl}</div>`;

  if(!withData.length){
    box.innerHTML=html+`<p class="empty">Belum ada data untuk ${curBrand} di periode ini.</p>`;
    if(charts.ctor){try{charts.ctor.destroy()}catch(e){}}
    return;
  }

  const bestOf=key=>Math.max(0,...withData.map(x=>+x[key]||0));

  function qCell(x,key,fmt){
    if(x.none) return `<td class="num" style="color:var(--text3)">—</td>`;
    const v=+x[key]||0;
    if(v<=0) return `<td class="num" style="color:var(--text3)">—</td>`;
    const best=bestOf(key);
    if(v===best) return `<td class="num" style="font-weight:700;color:var(--good)">${fmt(v)} <span style="font-size:10px">▲ tertinggi</span></td>`;
    const delta=Math.round((v/best-1)*100);
    return `<td class="num">${fmt(v)} <span style="font-size:11px;color:#f59e0b">${delta}%</span></td>`;
  }
  function vCell(x,key,fmt){
    if(x.none) return `<td class="num" style="color:var(--text3)">—</td>`;
    return `<td class="num">${fmt(+x[key]||0)}</td>`;
  }

  const head=`<th>Metrik</th>`+hd.map(x=>`<th class="num">${x.h.name}${x.none?' <span style="font-weight:400;color:var(--text3);font-size:10px">(no data)</span>':''}</th>`).join('');

  const volRows=[
    `<tr><td><b>GMV</b> <span style="font-size:10px;color:var(--text3)">volume · dipengaruhi jam tayang</span></td>${hd.map(x=>vCell(x,'gmv',rp)).join('')}</tr>`,
    `<tr><td>Sesi <span style="font-size:10px;color:var(--text3)">volume</span></td>${hd.map(x=>vCell(x,'sesi',v=>v)).join('')}</tr>`,
    `<tr><td>Pembeli <span style="font-size:10px;color:var(--text3)">volume</span></td>${hd.map(x=>vCell(x,'pembeli',v=>(v||0).toLocaleString('id-ID'))).join('')}</tr>`,
    `<tr style="border-top:2px solid var(--border2)"><td><b>AOV</b> <span style="font-size:10px;color:var(--text3)">kualitas basket</span></td>${hd.map(x=>qCell(x,'aov',rp)).join('')}</tr>`,
  ];
  const funnelRows = PLAT_VIEW==='all' ? [] : (PLAT_VIEW==='shopee' ? [
    `<tr><td><b>Klik/Viewer</b> <span style="font-size:10px;color:var(--text3)">daya tarik (Shopee)</span></td>${hd.map(x=>qCell(x,'kpv',pct)).join('')}</tr>`,
    `<tr><td><b>CTOR</b> <span style="font-size:10px;color:var(--text3)">closing</span></td>${hd.map(x=>qCell(x,'ctor',pct)).join('')}</tr>`,
    `<tr><td><b>Engagement</b> <span style="font-size:10px;color:var(--text3)">interaktivitas</span></td>${hd.map(x=>qCell(x,'eng',pct)).join('')}</tr>`,
  ] : [
    `<tr><td><b>CTR</b> <span style="font-size:10px;color:var(--text3)">daya tarik</span></td>${hd.map(x=>qCell(x,'ctr',pct)).join('')}</tr>`,
    `<tr><td><b>CTOR</b> <span style="font-size:10px;color:var(--text3)">closing</span></td>${hd.map(x=>qCell(x,'ctor',pct)).join('')}</tr>`,
    `<tr><td><b>Engagement</b> <span style="font-size:10px;color:var(--text3)">interaktivitas</span></td>${hd.map(x=>qCell(x,'eng',pct)).join('')}</tr>`,
  ]);
  const rowsHtml=[...volRows,...funnelRows].join('');

  html+=`
    <div class="tbl-wrap"><div class="tbl-scroll"><table>
      <thead><tr>${head}</tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div></div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5">
      ▲ = nilai terbaik di barisnya. Persentase = selisih relatif terhadap yang tertinggi.<br>
      ${PLAT_VIEW==='all'
        ? 'Mode Gabungan cuma adu GMV + volume + AOV — metrik funnel (CTR/Klik-Viewer/CTOR) tidak dicampur lintas platform. Pilih TikTok atau Shopee untuk lihat funnel.'
        : 'Penilaian "siapa lebih jago" pakai metrik kualitas (AOV, '+(PLAT_VIEW==='shopee'?'Klik/Viewer':'CTR')+', CTOR, Engagement), bukan GMV mentah — karena GMV besar sering cuma efek jam tayang ramai.'}
    </div>
    ${PLAT_VIEW==='all' ? '' : `<div class="chart-card" style="margin-top:1.1rem"><h3>CTOR — kemampuan closing (%)</h3><div class="chart-wrap sm"><canvas id="chCtor"></canvas></div></div>`}`;

  box.innerHTML=html;

  if(charts.ctor){try{charts.ctor.destroy()}catch(e){}}
  const cd=PLAT_VIEW==='all'? [] : withData.filter(x=>(+x.ctor||0)>0);
  if(cd.length && document.getElementById('chCtor')){
    charts.ctor=new Chart(document.getElementById('chCtor'),{type:'bar',data:{
      labels:cd.map(x=>x.h.name),
      datasets:[{data:cd.map(x=>(+x.ctor||0)*100),backgroundColor:cd.map(x=>x.h.color),borderRadius:5}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'%'}}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(255,255,255,.07)'}},x:{grid:{display:false}}}}});
  }
}

// ════════════════════════════════════
// TREN BRAND (bulan ke bulan, per brand, bulan berjalan dilabeli)
// ════════════════════════════════════
const TREND_BRANDS=[
  {name:'Onebear', color:'#e879f9'},
  {name:'Supoe',   color:'#3b82f6'},
  {name:'Momso',   color:'#f97316'},
];
const TREND_METRICS={
  gmv: {label:'GMV',        type:'money', val:s=>s.gmv},
  aov: {label:'AOV',        type:'money', val:s=>s.pembeli? s.gmv/s.pembeli : 0},
  ctr: {label:'CTR',        type:'pct',   val:s=>s.imp? s.kl/s.imp : 0},
  kpv: {label:'Klik/Viewer',type:'pct',   val:s=>s.vw? s.kl/s.vw : 0},
  ctor:{label:'CTOR',       type:'pct',   val:s=>s.kl? s.pembeli/s.kl : 0},
  eng: {label:'Engagement', type:'pct',   val:s=>s.vw? (s.likes+s.kom)/s.vw : 0},
};

function renderTrend(){
  const box=document.getElementById('trendContent');
  if(!box) return;

  // metrik yang valid per platform
  const metricKeysFor = PLAT_VIEW==='shopee' ? ['gmv','aov','kpv','ctor','eng']
                      : PLAT_VIEW==='all'    ? ['gmv','aov']
                      : ['gmv','aov','ctr','ctor','eng'];
  let metricKey=document.getElementById('trMetric')?.value || 'gmv';
  if(!metricKeysFor.includes(metricKey)) metricKey='gmv';
  const M=TREND_METRICS[metricKey];
  const fmt = M.type==='money' ? rp : pct;

  // all months across all brands (dalam platform view), ascending
  const months=[...new Set(platFilter(allPerf).filter(r=>r.tanggal).map(r=>r.tanggal.slice(0,7)))].sort();
  const thisMonth=new Date().toISOString().slice(0,7);
  const berjalanIdx=months.indexOf(thisMonth);          // -1 if current month has no data yet
  const labels=months.map(m=>{const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleDateString('id-ID',{month:'short',year:'2-digit'})});
  const berjalanLbl = berjalanIdx>=0 ? (()=>{const[y,mo]=thisMonth.split('-');return new Date(y,mo-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})})() : null;

  // sums per brand per month (optional day cutoff for MTD)
  function brandMonth(brand,m){ return brandPeriod(brand,m,99); }
  function brandPeriod(brand,m,maxDay){
    const r=platFilter(allPerf).filter(x=>x.brand===brand && x.tanggal && x.tanggal.startsWith(m) && (+x.tanggal.slice(8,10))<=maxDay);
    if(!r.length) return null;
    return r.reduce((a,x)=>{a.gmv+=+x.gmv||0;a.pembeli+=+x.pembeli||0;a.vw+=+x.viewers||0;a.imp+=+x.impresi||0;a.kl+=+x.klik_produk||0;a.likes+=+x.likes||0;a.kom+=+x.komentar||0;return a;},{gmv:0,pembeli:0,vw:0,imp:0,kl:0,likes:0,kom:0});
  }

  const series=TREND_BRANDS.map(b=>{
    const data=months.map(m=>{const s=brandMonth(b.name,m); if(!s) return null; const v=M.val(s); return (M.type==='pct'&&v<=0)?null:v;});
    return {b, data};
  });

  const mlabel=m=>{const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleDateString('id-ID',{month:'short',year:'2-digit'})};

  // Badge: kalau ada bulan berjalan -> MTD (same-period) vs bulan komplit terakhir.
  // Cutoff = tanggal data terakhir di bulan berjalan. Chart tetap pakai total bulan penuh.
  const completed=months.filter(m=>m!==thisMonth);
  const hasBerjalan=months.includes(thisMonth);
  let cutoffDay=0;
  if(hasBerjalan){
    cutoffDay=Math.max(0,...allPerf.filter(r=>r.tanggal&&r.tanggal.startsWith(thisMonth)).map(r=>+r.tanggal.slice(8,10)));
  }
  let cmpM,baseM,winDay,badgeNote;
  if(hasBerjalan && cutoffDay>0 && completed.length>=1){
    cmpM=thisMonth; baseM=completed[completed.length-1]; winDay=cutoffDay;
    badgeNote=`Pacing ${mlabel(baseM)} (1–${winDay}) → ${mlabel(cmpM)} (1–${winDay}) · sama-sama ${winDay} hari pertama`;
  } else {
    cmpM=completed[completed.length-1]; baseM=completed[completed.length-2]; winDay=99;
    badgeNote=baseM?`Perubahan ${mlabel(baseM)} → ${mlabel(cmpM)} (bulan komplit terakhir)`:'';
  }
  const badges=TREND_BRANDS.map(b=>{
    if(!cmpM||!baseM) return {b, txt:'butuh 2 bulan', dir:0};
    const sC=brandPeriod(b.name,cmpM,winDay), sB=brandPeriod(b.name,baseM,winDay);
    const vC=sC?M.val(sC):null, vB=sB?M.val(sB):null;
    if(vC==null||vB==null||vB<=0) return {b, txt:'data kurang', dir:0};
    const d=Math.round((vC/vB-1)*100);
    return {b, txt:(d>=0?'+':'')+d+'%', dir:Math.sign(d)};
  });

  let html=`
    ${platToggle()}
    <div class="filter-row">
      <select id="trMetric" onchange="renderTrend()">
        ${metricKeysFor.map(k=>`<option value="${k}" ${k===metricKey?'selected':''}>${TREND_METRICS[k].label}</option>`).join('')}
      </select>
    </div>
    <div class="section-title">Tren ${M.label} per Brand · ${PLAT_LABEL[PLAT_VIEW]}</div>`;

  if(months.length<2){
    box.innerHTML=html+`<p class="empty">Butuh minimal 2 bulan data untuk lihat tren.</p>`;
    if(charts.trend){try{charts.trend.destroy()}catch(e){}}
    return;
  }

  // MoM badges
  html+=`<div style="font-size:11px;color:var(--text3);margin:-4px 0 8px">${badgeNote}</div>
    <div class="stats" style="margin-bottom:1rem">
    ${badges.map(x=>{
      const col = x.dir>0?'var(--good)':(x.dir<0?'#f87171':'var(--text3)');
      const arr = x.dir>0?'▲':(x.dir<0?'▼':'');
      return `<div class="stat"><div class="stat-l">${x.b.name}</div><div class="stat-v" style="color:${col};font-size:18px">${x.txt} ${arr}</div></div>`;
    }).join('')}
    </div>
    <div class="chart-card"><h3>${M.label} bulan ke bulan</h3><div class="chart-wrap"><canvas id="chTrend"></canvas></div></div>`;

  if(berjalanLbl){
    html+=`<div style="font-size:11px;color:#f59e0b;margin-top:8px">⏳ ${berjalanLbl} masih berjalan — titik terakhir (garis putus-putus) belum lengkap, jadi tidak dipakai di perhitungan perubahan %.</div>`;
  }

  box.innerHTML=html;

  // line chart
  if(charts.trend){try{charts.trend.destroy()}catch(e){}}
  charts.trend=new Chart(document.getElementById('chTrend'),{
    type:'line',
    data:{labels, datasets: series.map(s=>({
      label:s.b.name,
      data:s.data,
      borderColor:s.b.color,
      backgroundColor:s.b.color+'22',
      tension:.3, pointRadius:3, spanGaps:true,
      segment:{ borderDash: ctx => (berjalanIdx>=0 && ctx.p1DataIndex===berjalanIdx) ? [6,4] : undefined },
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#cbd5e1',font:{size:11},usePointStyle:true}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y==null?'—':fmt(c.parsed.y)}`}}},
      scales:{y:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>M.type==='money'?('Rp'+(v/1e6).toFixed(1)+'jt'):((v*100).toFixed(1)+'%')},grid:{color:'rgba(255,255,255,.07)'}},
        x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{display:false}}}}
  });
}

function drilldown(email,name){

// ── Edit / Hapus Sesi ──
let _editId=null;
function findSesi(id){ return [...myData, ...allPerf].find(r=>String(r.id)===String(id)); }

function openEditSesi(id){
  const r=findSesi(id);
  if(!r){ showToast('Data sesi tidak ditemukan.','error'); return; }
  _editId=id;
  const set=(i,v)=>{ const el=document.getElementById(i); if(el) el.value=(v==null?'':v); };
  document.getElementById('e_platform').value = platOf(r);
  set('e_tanggal', r.tanggal||'');
  document.getElementById('e_sesi').value=String(r.sesi||1);
  set('e_gmv',r.gmv); set('e_pembeli',r.pembeli); set('e_items',r.items);
  const m=+r.durasi_menit||0;
  set('e_durasi_jam', m?Math.floor(m/60):''); set('e_durasi_min', m? m%60 : '');
  set('e_viewers',r.viewers); set('e_impresi',r.impresi); set('e_klik',r.klik_produk); set('e_atc',r.atc);
  set('e_avg',r.avg_view_dur); set('e_foll',r.followers_baru); set('e_likes',r.likes); set('e_kom',r.komentar);
  applyEditPlatform();
  // screenshot
  _editSSUrl = r.screenshot_url || null;
  resetSSInput('e_ss_file','e_ss_prompt','e_ss_preview');
  setupSSInput('e_ss_file','e_ss_drop','e_ss_prompt','e_ss_preview');
  const cur=document.getElementById('e_ss_current');
  cur.innerHTML = _editSSUrl
    ? `<img src="${_editSSUrl}" class="ss-thumb" style="height:60px" onclick="viewScreenshot('${_editSSUrl}')" title="Lihat" /> <button class="row-btn del" onclick="markSSRemove(this)" type="button">Hapus screenshot</button>`
    : `<span class="hint">Belum ada screenshot.</span>`;
  _editSSRemove=false;
  document.getElementById('editModal').classList.add('open');
}
let _editSSUrl=null, _editSSRemove=false;
function markSSRemove(btn){ _editSSRemove=true; document.getElementById('e_ss_current').innerHTML='<span class="hint" style="color:var(--bad)">Screenshot akan dihapus saat disimpan.</span>'; }
function closeEditModal(){ document.getElementById('editModal').classList.remove('open'); _editId=null; }
function applyEditPlatform(){
  const isS=(document.getElementById('e_platform')?.value)==='shopee';
  const setDisp=(id,show)=>{const el=document.getElementById(id); if(el) el.style.display=show?'':'none';};
  setDisp('fg_e_impresi',!isS);
  setDisp('fg_e_atc',isS);
}

async function saveEditSesi(){
  if(_editId==null) return;
  const v=id=>document.getElementById(id).value;
  const n=id=>+document.getElementById(id).value||0;
  if(!v('e_tanggal')){ alert('Tanggal tidak boleh kosong.'); return; }
  let screenshot_url = _editSSRemove ? null : _editSSUrl;
  const newFile=document.getElementById('e_ss_file')?.files[0];
  if(newFile){
    try{ showToast('Mengupload screenshot...','info'); screenshot_url=await uploadScreenshot(newFile, ME||'leader', v('e_tanggal'), v('e_sesi')); }
    catch(err){ showToast('Gagal upload screenshot: '+(err.message||err),'error'); return; }
  }
  const payload={
    tanggal:v('e_tanggal'), sesi:+v('e_sesi'),
    platform:v('e_platform')||'tiktok',
    gmv:n('e_gmv'), pembeli:n('e_pembeli'), items:n('e_items'),
    viewers:n('e_viewers'), impresi:n('e_impresi'), klik_produk:n('e_klik'), atc:n('e_atc'),
    avg_view_dur:n('e_avg'), durasi_menit:n('e_durasi_jam')*60+n('e_durasi_min'),
    followers_baru:n('e_foll'), likes:n('e_likes'), komentar:n('e_kom'),
    screenshot_url,
  };
  const {data,error}=await sb.from('live_performance').update(payload).eq('id',_editId).select();
  if(error){ showToast('Gagal menyimpan: '+error.message,'error'); return; }
  if(!data||!data.length){ showToast('Perubahan tidak tersimpan — akunmu belum punya izin edit (lihat catatan SQL).','error'); return; }
  showToast('Perubahan tersimpan!','success');
  closeEditModal();
  await afterPerfChange();
}

function setupDrop(){
  updateImpHosts();

  document.getElementById('impSore').onchange=reprocessIfLoaded;
  const drop=document.getElementById('drop'), inp=document.getElementById('fileInput');

let pendingRows=[];
let lastRawRows=null;
function reprocessIfLoaded(){ if(lastRawRows) routeImport(lastRawRows); }
function parseFile(file){
  const reader=new FileReader();
  const isCsv=/\.csv$/i.test(file.name||'');
  reader.onload=e=>{
    try{
      let rows;
      if(isCsv){
        rows=parseCSV(String(e.target.result));
      }else{
        const wb=XLSX.read(e.target.result,{type:'array'});
        // find the input sheet (first sheet with 'Input' or just first)
        let sheetName=wb.SheetNames.find(n=>n.includes('Input'))||wb.SheetNames[0];
        const ws=wb.Sheets[sheetName];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
      }
      routeImport(rows);
    }catch(err){ showToast('Gagal baca file: '+err.message,'error'); }
  };
  if(isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
}

// ── Router: deteksi format Shopee vs TikTok-tracker ──
function isShopeeRows(rows){
  return rows.some(r=>r&&r.some(c=>{const s=String(c).trim(); return s==='Sales(Confirmed Order)'||s==='Start Time';}));
}
function routeImport(rows){
  lastRawRows=rows;
  if(isShopeeRows(rows)) processImportShopee(rows);
  else processImport(rows);
}

// ── CSV parser (handle BOM, quoted fields, koma di dalam tanda kutip, CRLF) ──
function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');
  const rows=[]; let row=[], cur='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; }
      else cur+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){ /* skip */ }
      else cur+=c;
    }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
// Angka format Indonesia: titik=ribuan, koma=desimal. Buang 'Rp'. "Rp594.177"→594177, "179.693,65"→179693.65
function parseRpID(v){
  if(v==null) return 0;
  let s=String(v).trim().replace(/rp/i,'').replace(/\s/g,'');
  if(s===''||s==='-') return 0;
  s=s.replace(/\./g,'').replace(',','.');
  const n=parseFloat(s.replace(/[^\d.-]/g,''));
  return isNaN(n)?0:n;
}
// "31-05-2026 18:25" → {tanggal:'2026-05-31', mins: 1105}
function parseShopeeStart(v){
  const m=String(v||'').trim().match(/(\d{1,2})-(\d{1,2})-(\d{4})\s+(\d{1,2}):(\d{2})/);
  if(!m) return null;
  return { tanggal:`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`, mins:(+m[4])*60+(+m[5]) };
}
// "HH:MM:SS" → detik
function hmsToSec(v){
  const m=String(v||'').match(/(\d{1,2}):(\d{2}):(\d{2})/);
  return m? (+m[1])*3600+(+m[2])*60+(+m[3]) : 0;
}

function timeToMin(t){
  if(!t)return null;
  const m=String(t).match(/(\d{1,2}):(\d{2})/);
  if(!m)return null;
  return (+m[1])*60+(+m[2]);
}
function assignSesi(mins){
  if(mins<11*60)return 1;
  if(mins<14*60)return 2;
  if(mins<18*60)return 3;
  return 4;
}
function normDate(d){
  if(!d)return null;
  // accept 2026-05-01 or other; try Date parse
  const s=String(d).trim();
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  const dt=new Date(s); if(!isNaN(dt)) return dt.toISOString().slice(0,10);
  return null;
}

function processImport(rows){
  lastRawRows=rows;
  const brand=document.getElementById('impBrand').value;
  const pagiEmail=document.getElementById('impPagi').value;
  const soreEmail=document.getElementById('impSore').value;
  const pagi=ALL_HOSTS.find(h=>h.email===pagiEmail), sore=ALL_HOSTS.find(h=>h.email===soreEmail);

  // find header row: row containing 'Tanggal' and 'Waktu'
  let hi=rows.findIndex(r=>r&&r.some(c=>String(c).trim()==='Tanggal')&&r.some(c=>String(c).includes('Waktu')));
  if(hi<0){ showToast('Format tidak dikenali (tidak ada kolom Tanggal/Waktu).','error'); return; }
  const head=rows[hi].map(c=>String(c).replace(/\n/g,' ').trim());
  const col=name=>head.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const ci={ tgl:col('Tanggal'), wkt:col('Waktu'), dur:col('Durasi'), gmv:col('GMV'), pemb:col('Pembeli'),
    items:col('Items'), view:col('Viewers'), imp:col('Impresi'), klik:col('Klik'),
    avg:col('Avg Watch'), foll:col('Pengikut'), likes:col('Likes'), kom:col('Komentar') };

  const num=v=>{ if(v==null||v==='')return 0; const n=parseFloat(String(v).replace(/[^\d.-]/g,'')); return isNaN(n)?0:n; };
  pendingRows=[];
  let dropped=0;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r[ci.tgl]||!r[ci.wkt])continue;
    const tanggal=normDate(r[ci.tgl]); const mins=timeToMin(r[ci.wkt]);
    if(!tanggal||mins==null)continue;
    const sesi=assignSesi(mins);
    const who = sesi<=2? pagi : sore;
    const gmv=num(r[ci.gmv]), viewers=num(r[ci.view]);
    if(gmv===0 && viewers===0){ dropped++; continue; }
    pendingRows.push({
      host:who.name, brand, host_email:who.email, tanggal, sesi, platform:'tiktok',
      gmv, pembeli:Math.round(num(r[ci.pemb])), items:Math.round(num(r[ci.items])),
      viewers:Math.round(viewers), impresi:Math.round(num(r[ci.imp])), klik_produk:Math.round(num(r[ci.klik])),
      avg_view_dur:Math.round(num(r[ci.avg])), durasi_menit:Math.round(num(r[ci.dur])),
      followers_baru:Math.round(num(r[ci.foll])), likes:Math.round(num(r[ci.likes])), komentar:Math.round(num(r[ci.kom])),
    });
  }
  // preview
  const byHost={};
  pendingRows.forEach(p=>{byHost[p.host]=(byHost[p.host]||0)+1;});
  const summary=Object.entries(byHost).map(([h,c])=>`${h}: ${c} sesi`).join(' · ');
  document.getElementById('impPreview').innerHTML=`
    <div style="margin-top:16px;padding:14px;background:var(--goodbg);border:1px solid var(--goodbd);border-radius:var(--r)">
      <div style="font-weight:600;color:var(--good);margin-bottom:4px">✓ ${pendingRows.length} sesi siap diimport (${dropped} dilewati)</div>
      <div style="font-size:12px;color:var(--text2)">${summary}</div>
    </div>
    <div class="tbl-wrap" style="margin-top:12px"><div class="tbl-scroll"><table>
      <thead><tr><th>Tgl</th><th>Host</th><th>Sesi</th><th class="num">GMV</th><th class="num">Viewers</th><th class="num">Klik</th></tr></thead>
      <tbody>${pendingRows.slice(0,8).map(p=>`<tr><td>${fmtTgl(p.tanggal)}</td><td>${p.host}</td><td>S${p.sesi}</td><td class="num">${rp(p.gmv)}</td><td class="num">${p.viewers.toLocaleString('id-ID')}</td><td class="num">${p.klik_produk}</td></tr>`).join('')}</tbody>
    </table></div></div>
    ${pendingRows.length>8?`<div style="font-size:12px;color:var(--text3);margin:6px 0 12px">…dan ${pendingRows.length-8} sesi lainnya</div>`:'<div style="height:12px"></div>'}
    <button class="btn-accent" onclick="confirmImport()">Import ${pendingRows.length} Sesi ke Database</button>`;
}

// ── Importer Shopee (CSV Confirmed Order, per-live) ──
function processImportShopee(rows){
  const brand=document.getElementById('impBrand').value;
  const pagiEmail=document.getElementById('impPagi').value;
  const soreEmail=document.getElementById('impSore').value;
  const pagi=ALL_HOSTS.find(h=>h.email===pagiEmail), sore=ALL_HOSTS.find(h=>h.email===soreEmail);

  // header row: ada 'Start Time' & 'Sales(Confirmed Order)'
  let hi=rows.findIndex(r=>r&&r.some(c=>String(c).trim()==='Start Time')&&r.some(c=>String(c).trim()==='Sales(Confirmed Order)'));
  if(hi<0){ showToast('Format Shopee tidak dikenali (header Start Time / Sales(Confirmed Order) tidak ada).','error'); return; }
  const head=rows[hi].map(c=>String(c).trim());
  // exact match dulu (penting: Confirmed bukan Placed, Viewers bukan Engaged Viewers)
  const col=nm=>head.findIndex(h=>h.toLowerCase()===nm.toLowerCase());
  const ci={
    start: col('Start Time'),
    dur:   col('Duration'),
    kom:   col('Comments'),
    atc:   col('ATC'),
    avg:   col('Avg. Viewing Duration'),
    view:  col('Viewers'),
    pemb:  col('Orders(Confirmed Order)'),
    items: col('Items Sold(Confirmed Order)'),
    gmv:   col('Sales(Confirmed Order)'),
  };
  if(ci.start<0||ci.gmv<0){ showToast('Kolom Start Time / Sales(Confirmed Order) tidak ketemu.','error'); return; }

  pendingRows=[];
  let dropped=0;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r[ci.start])continue;
    const st=parseShopeeStart(r[ci.start]);
    if(!st)continue;
    const sesi=assignSesi(st.mins);
    const who=sesi<=2? pagi : sore;
    const gmv=parseRpID(r[ci.gmv]);
    const viewers=Math.round(parseRpID(r[ci.view]));
    if(gmv===0 && viewers===0){ dropped++; continue; }
    pendingRows.push({
      host:who.name, brand, host_email:who.email, tanggal:st.tanggal, sesi, platform:'shopee',
      gmv, pembeli:Math.round(parseRpID(r[ci.pemb])), items:Math.round(parseRpID(r[ci.items])),
      viewers, komentar:Math.round(parseRpID(r[ci.kom])), atc:ci.atc>=0?Math.round(parseRpID(r[ci.atc])):0,
      avg_view_dur:hmsToSec(r[ci.avg]), durasi_menit:Math.round(hmsToSec(r[ci.dur])/60),
      impresi:0, klik_produk:0, likes:0, followers_baru:0,
    });
  }

  const byHost={};
  pendingRows.forEach(p=>{byHost[p.host]=(byHost[p.host]||0)+1;});
  const summary=Object.entries(byHost).map(([h,c])=>`${h}: ${c} sesi`).join(' · ');
  document.getElementById('impPreview').innerHTML=`
    <div style="margin-top:16px;padding:14px;background:var(--goodbg);border:1px solid var(--goodbd);border-radius:var(--r)">
      <div style="font-weight:600;color:var(--good);margin-bottom:4px">✓ ${pendingRows.length} sesi Shopee siap diimport (${dropped} dilewati) <span class="badge" style="background:#ee4d2d22;color:#ff7a59;border-color:#ee4d2d55">Shopee</span></div>
      <div style="font-size:12px;color:var(--text2)">${summary||'—'}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Impresi/Klik/Likes/Followers tidak ada di export Shopee → diisi 0. GMV pakai Confirmed Order.</div>
    </div>
    <div class="tbl-wrap" style="margin-top:12px"><div class="tbl-scroll"><table>
      <thead><tr><th>Tgl</th><th>Host</th><th>Sesi</th><th class="num">GMV</th><th class="num">Pembeli</th><th class="num">Viewers</th><th class="num">ATC</th></tr></thead>
      <tbody>${pendingRows.slice(0,8).map(p=>`<tr><td>${fmtTgl(p.tanggal)}</td><td>${p.host}</td><td>S${p.sesi}</td><td class="num">${rp(p.gmv)}</td><td class="num">${p.pembeli}</td><td class="num">${p.viewers.toLocaleString('id-ID')}</td><td class="num">${p.atc}</td></tr>`).join('')}</tbody>
    </table></div></div>
    ${pendingRows.length>8?`<div style="font-size:12px;color:var(--text3);margin:6px 0 12px">…dan ${pendingRows.length-8} sesi lainnya</div>`:'<div style="height:12px"></div>'}
    ${pendingRows.length?`<button class="btn-accent" onclick="confirmImport()">Import ${pendingRows.length} Sesi Shopee ke Database</button>`:''}`;
}

async function confirmImport(){
  if(!pendingRows.length)return;
  if(!confirm(`Import ${pendingRows.length} sesi? Pastikan data belum pernah diimport sebelumnya (untuk hindari duplikat).`))return;
  showToast('Mengimport...','info');
  // insert in chunks of 50
  for(let i=0;i<pendingRows.length;i+=50){
    const chunk=pendingRows.slice(i,i+50);
    const {error}=await sb.from('live_performance').insert(chunk);
    if(error){showToast('Gagal di baris '+i+': '+error.message,'error');return;}
  }
  showToast(`Berhasil import ${pendingRows.length} sesi!`,'success');
  document.getElementById('impPreview').innerHTML='';
  pendingRows=[];
  loadDash();
}

// ── Tabs / utils ──
function switchTab(el,id){
  el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTabById(id){
  document.querySelectorAll('#tabs .tab').forEach((t,i)=>{
    t.classList.toggle('active', (id==='l-home'&&i===0)||(id==='l-dash'&&i===1)||(id==='l-import'&&i===2));
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function fillDateDropdown(id){
  const sel=document.getElementById(id); if(!sel)return;
  const today=new Date(); let html='';
  for(let i=0;i<30;i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    html+=`<option value="${iso}">${d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</option>`;
  }
  sel.innerHTML=html;
}
function fmtTgl(t){ if(!t)return'—'; const d=new Date(t+'T00:00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
