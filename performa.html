<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f6f4ef; --surface:#fff; --surface2:#f1ede6;
    --border:#e7e2d9; --border2:#d4cdc0;
    --text:#1c1a2e; --text2:#6b6678; --text3:#a8a2b0;
    --accent:#6d28d9; --accentbg:#f3f0ff;
    --good:#16a34a; --goodbg:#f0fdf4; --goodbd:#bbf7d0;
    --warn:#d97706; --warnbg:#fffbeb; --warnbd:#fde68a;
    --bad:#dc2626; --badbg:#fef2f2; --badbd:#fecaca;
    --twilight:linear-gradient(135deg,#312e81 0%,#6d28d9 45%,#f97316 100%);
    --dusk:#1e1b3a;
    --r:12px; --rs:8px;
  }
  body { font-family:'Plus Jakarta Sans', sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; min-height:100vh; }

  /* Login */
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; background:var(--twilight); position:relative; overflow:hidden; }
  .login-wrap::before { content:''; position:absolute; width:140%; height:60%; left:-20%; bottom:-10%; background:radial-gradient(ellipse at center, rgba(251,191,36,.35), transparent 70%); pointer-events:none; }
  .login-card { background:rgba(255,255,255,.97); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.4); border-radius:20px; padding:2.5rem 2.5rem 2rem; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 60px rgba(30,27,58,.4); position:relative; z-index:1; }
  .brand-mark { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:1.5rem; }
  .brand-dot { width:34px; height:34px; border-radius:50%; background:var(--twilight); box-shadow:0 2px 12px rgba(109,40,217,.4); flex-shrink:0; }
  .brand-name { font-size:19px; font-weight:800; letter-spacing:-.02em; color:var(--text); }
  .brand-name span { background:var(--twilight); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .login-card h1 { font-size:17px; font-weight:700; margin-bottom:4px; letter-spacing:-.01em; }
  .login-card p { font-size:13px; color:var(--text2); margin-bottom:1.5rem; }
  .login-card input { width:100%; padding:12px 14px; border:1px solid var(--border2); border-radius:10px; font-size:14px; margin-bottom:11px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text); outline:none; transition:border-color .15s, box-shadow .15s; }
  .login-card input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accentbg); }
  .btn-primary { width:100%; padding:12px; background:var(--twilight); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; box-shadow:0 4px 14px rgba(109,40,217,.3); transition:transform .1s, box-shadow .15s; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(109,40,217,.4); }
  .msg { display:none; margin-top:12px; font-size:13px; }

  /* App shell */
  .app { display:none; max-width:920px; margin:0 auto; padding:1.5rem 1.5rem 4rem; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; padding-bottom:1.2rem; border-bottom:1px solid var(--border); }
  .topbar h1 { font-size:19px; font-weight:800; letter-spacing:-.02em; }
  .topbar p { font-size:13px; color:var(--text2); margin-top:2px; }
  .topbar-actions { display:flex; gap:8px; align-items:center; }
  .btn-ghost { padding:6px 14px; border-radius:20px; border:1px solid var(--border2); background:var(--surface); font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text2); text-decoration:none; }
  .btn-ghost:hover { background:var(--surface2); }

  /* Tabs */
  .tabs { display:flex; gap:6px; margin-bottom:1.3rem; flex-wrap:wrap; }
  .tab { padding:8px 18px; border-radius:20px; border:1px solid var(--border2); background:var(--surface); font-size:13px; font-weight:600; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text2); transition:.15s; }
  .tab:hover { border-color:var(--accent); color:var(--accent); }
  .tab.active { background:var(--twilight); color:#fff; border-color:transparent; box-shadow:0 2px 10px rgba(109,40,217,.3); }
  .panel { display:none; }
  .panel.active { display:block; }

  /* Form */
  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.5rem; margin-bottom:1rem; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .fg { display:flex; flex-direction:column; }
  .fg.full { grid-column:1 / -1; }
  .fg label { font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .fg input, .fg select { width:100%; padding:9px 12px; border:1px solid var(--border2); border-radius:var(--rs); font-size:13px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text); background:var(--surface); outline:none; }
  .fg input:focus, .fg select:focus { border-color:var(--accent); }
  .group-label { font-size:12px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin:16px 0 4px; grid-column:1 / -1; }
  .group-label:first-child { margin-top:0; }
  .hint { font-size:11px; color:var(--text3); margin-top:3px; }

  /* Calc preview */
  .calc-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--border2); grid-column:1 / -1; }
  .calc { background:var(--surface2); border-radius:var(--rs); padding:8px 10px; text-align:center; }
  .calc-l { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
  .calc-v { font-size:14px; font-weight:600; color:var(--text); margin-top:2px; }

  /* Stats */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.3rem; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:13px 15px; text-align:center; }
  .stat-l { font-size:10.5px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .stat-v { font-size:19px; font-weight:600; color:var(--text); letter-spacing:-.02em; }
  .stat-v.good{color:var(--good);} .stat-v.warn{color:var(--warn);} .stat-v.bad{color:var(--bad);}
  .grp-head { font-size:12px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin:0 0 8px 2px; }
  .menu-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; cursor:pointer; transition:border-color .15s, transform .1s; display:block; }
  .menu-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .menu-ic { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:10px; }
  .menu-t { font-size:14px; font-weight:600; margin-bottom:2px; }
  .menu-s { font-size:12px; color:var(--text3); }

  /* Chart card */
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:1.3rem; }
  .chart-card h3 { font-size:13px; font-weight:500; margin-bottom:14px; }
  .chart-wrap { height:200px; position:relative; }
  .chart-wrap.sm { height:150px; }

  /* Table */
  .tbl-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:1.3rem; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { background:var(--surface2); text-align:left; padding:9px 11px; font-weight:600; color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; border-bottom:1px solid var(--border); }
  td { padding:9px 11px; border-bottom:1px solid var(--border); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .tbl-scroll { overflow-x:auto; }
  .num { text-align:right; font-variant-numeric:tabular-nums; }

  /* Brand badge */
  .badge { display:inline-block; font-size:10px; font-weight:500; padding:2px 8px; border-radius:10px; background:var(--accentbg); color:var(--accent); }

  /* Import */
  .drop { border:2px dashed var(--border2); border-radius:var(--r); padding:2.5rem; text-align:center; background:var(--surface); cursor:pointer; transition:border-color .15s; }
  .drop:hover { border-color:var(--accent); }
  .drop.over { border-color:var(--accent); background:var(--accentbg); }
  .drop-icon { font-size:32px; margin-bottom:8px; }
  .drop-t { font-size:14px; font-weight:500; margin-bottom:3px; }
  .drop-s { font-size:12px; color:var(--text3); }

  /* Misc */
  .empty { text-align:center; padding:3rem 0; color:var(--text3); font-size:13px; }
  .toast { position:fixed; bottom:24px; right:24px; padding:12px 18px; border-radius:var(--r); font-size:13px; font-weight:500; border:1px solid var(--border); background:var(--surface); box-shadow:0 4px 16px rgba(0,0,0,.1); z-index:9999; opacity:0; transform:translateY(8px); transition:.2s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { background:var(--goodbg); border-color:var(--goodbd); color:var(--good); }
  .toast.error { background:var(--badbg); border-color:var(--badbd); color:var(--bad); }
  .btn-accent { padding:10px 20px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); font-size:13px; font-weight:500; cursor:pointer; font-family:'Plus Jakarta Sans', sans-serif; }
  .btn-accent:hover { background:#333; }
  .btn-accent:disabled { opacity:.5; cursor:not-allowed; }
  .filter-row { display:flex; gap:10px; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
  .filter-row select { padding:7px 10px; border:1px solid var(--border2); border-radius:var(--rs); font-size:13px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--text); background:var(--surface); outline:none; }
  .section-title { font-size:15px; font-weight:600; margin-bottom:1rem; }

  @media (max-width:600px){
    .form-grid{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;}
    .calc-row{grid-template-columns:1fr;}
  }

  /* ════════ SENJA — DUSK THEME (langit malam, sisa cahaya jingga di horizon) ════════ */
  :root{
    --bg:#0d0c17; --surface:#17152a; --surface2:#211e3a;
    --border:#2a2742; --border2:#3a3658;
    --text:#f1eefb; --text2:#b0aacb; --text3:#76709a;
    --accent:#a78bfa; --accent-bg:rgba(167,139,250,.13); --accentbg:rgba(167,139,250,.13);
    --good:#4ade80; --good-bg:rgba(74,222,128,.13); --goodbg:rgba(74,222,128,.13);
    --good-border:rgba(74,222,128,.32); --goodbd:rgba(74,222,128,.32);
    --warn:#fbbf24; --warn-bg:rgba(251,191,36,.13); --warnbg:rgba(251,191,36,.13);
    --warn-border:rgba(251,191,36,.32); --warnbd:rgba(251,191,36,.32);
    --bad:#fb7185; --bad-bg:rgba(251,113,133,.13); --badbg:rgba(251,113,133,.13);
    --bad-border:rgba(251,113,133,.32); --badbd:rgba(251,113,133,.32);
    --star-on:#fbbf24; --star-off:#272343;
    --twilight:linear-gradient(135deg,#3b2f9e 0%,#6d28d9 45%,#f97316 100%);
    --dusk:#17152a;
  }
  html{ color-scheme:dark; scrollbar-color:#322e4e transparent; }
  body{ background:
    radial-gradient(1100px 480px at 88% -8%, rgba(109,40,217,.16), transparent 60%),
    radial-gradient(900px 420px at 6% 4%, rgba(249,115,22,.07), transparent 55%),
    var(--bg); background-attachment:fixed; }
  ::selection{ background:rgba(167,139,250,.35); color:#fff; }
  ::-webkit-scrollbar{ width:11px; height:11px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#322e4e; border-radius:9px; border:3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:#473f6b; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  /* numeric signature face — uang & skor yang paling sering dilihat tim */
  .brand-name,.hero-num,.stat-v,.stat-value,.host-score,.eval-score,.section-avg,.calc-v{
    font-family:'Space Grotesk','Plus Jakarta Sans',sans-serif; font-feature-settings:'tnum' 1; }
  /* login jadi kaca gelap di atas horizon senja */
  .login-card{ background:rgba(20,18,38,.66)!important; border:1px solid rgba(167,139,250,.22)!important;
    box-shadow:0 26px 70px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05)!important; }
  .login-card input{ background:rgba(10,9,20,.55); }
  .login-card input::placeholder{ color:var(--text3); }
  .login-wrap::before{ opacity:.85; }
  /* tombol aksi pakai gradient senja (sebelumnya pakai --text yang kini terang) */
  .btn-accent{ background:var(--twilight)!important; color:#fff!important; border:none!important;
    box-shadow:0 6px 18px rgba(109,40,217,.32); }
  .btn-accent:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  /* row actions + edit modal */
  .row-btn{ background:transparent; border:1px solid var(--border2); border-radius:7px; padding:3px 7px;
    font-size:13px; cursor:pointer; line-height:1; margin-right:5px; transition:.12s; }
  .row-btn:hover{ border-color:var(--accent); background:var(--accent-bg); transform:translateY(-1px); }
  .row-btn.del:hover{ border-color:var(--bad); background:var(--bad-bg); }
  .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(5,4,12,.66); backdrop-filter:blur(3px);
    z-index:200; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--surface); border:1px solid var(--border2); border-radius:16px; width:100%;
    max-width:560px; max-height:88vh; display:flex; flex-direction:column; box-shadow:0 28px 80px rgba(0,0,0,.6); }
  .modal-top{ display:flex; justify-content:space-between; align-items:center; padding:16px 20px;
    border-bottom:1px solid var(--border); }
  .modal-h{ font-size:15px; font-weight:700; letter-spacing:-.01em; }
  .modal-x{ background:none; border:none; font-size:22px; line-height:1; cursor:pointer; color:var(--text2); padding:2px 6px; }
  .modal-x:hover{ color:var(--text); }
  .modal-content{ padding:18px 20px; overflow-y:auto; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 20px; border-top:1px solid var(--border); }
  @media (prefers-reduced-motion:reduce){ *{ transition:none!important; animation:none!important; } }

  .hero{ box-shadow:0 14px 40px rgba(0,0,0,.45)!important; border:1px solid rgba(167,139,250,.18)!important; }

<body>

<!-- LOGIN -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="brand-mark">
      <div class="brand-dot"></div>
      <div class="brand-name">Senja <span>Studio</span></div>
    </div>
    <h1>Performa &amp; Evaluasi Host</h1>
    <p>Masuk dengan email &amp; password kamu</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="pass" placeholder="Password" />
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Masuk</button>
    <p class="msg" id="loginMsg"></p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

    <div style="display:flex;align-items:center;gap:11px">
      <div class="brand-dot" style="width:30px;height:30px"></div>

        <p id="subtitle"></p>
      </div>
    </div>
    <div class="topbar-actions" id="topActions"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT SESI MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-top">
      <span class="modal-h">Edit Sesi</span>
      <button class="modal-x" onclick="closeEditModal()" title="Tutup">×</button>
    </div>
    <div class="modal-content">
      <div class="form-grid">
        <div class="fg"><label>Tanggal</label><input type="date" id="e_tanggal" /></div>
        <div class="fg"><label>Sesi</label><select id="e_sesi">
          <option value="1">Sesi 1 (07:00–10:00)</option>
          <option value="2">Sesi 2 (11:00–14:00)</option>
          <option value="3">Sesi 3 (14:30–17:30)</option>
          <option value="4">Sesi 4 (18:30–21:30)</option>
        </select></div>
        <div class="fg"><label>GMV (Rp)</label><input type="number" id="e_gmv" placeholder="0" /></div>
        <div class="fg"><label>Pembeli</label><input type="number" id="e_pembeli" placeholder="0" /></div>
        <div class="fg"><label>Items Sold</label><input type="number" id="e_items" placeholder="0" /></div>
        <div class="fg"><label>Durasi live</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" id="e_durasi_jam" placeholder="0" min="0" style="width:64px" />
            <span class="hint" style="margin:0">jam</span>
            <input type="number" id="e_durasi_min" placeholder="0" min="0" max="59" style="width:64px" />
            <span class="hint" style="margin:0">menit</span>
          </div>
        </div>
        <div class="fg"><label>Viewers</label><input type="number" id="e_viewers" placeholder="0" /></div>
        <div class="fg"><label>Impresi</label><input type="number" id="e_impresi" placeholder="0" /></div>
        <div class="fg"><label>Klik Produk</label><input type="number" id="e_klik" placeholder="0" /></div>
        <div class="fg"><label>Avg View Dur (dtk)</label><input type="number" id="e_avg" placeholder="0" /></div>
        <div class="fg"><label>Followers Baru</label><input type="number" id="e_foll" placeholder="0" /></div>
        <div class="fg"><label>Likes</label><input type="number" id="e_likes" placeholder="0" /></div>
        <div class="fg"><label>Komentar</label><input type="number" id="e_kom" placeholder="0" /></div>
        <div class="fg"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeEditModal()">Batal</button>
      <button class="btn-accent" onclick="saveEditSesi()">Simpan Perubahan</button>
    </div>
  </div>
</div>

// Derived metrics
function derive(r){
  const gmv=+r.gmv||0, pembeli=+r.pembeli||0, impresi=+r.impresi||0, klik=+r.klik_produk||0,
        viewers=+r.viewers||0, likes=+r.likes||0, komentar=+r.komentar||0, durasi=+r.durasi_menit||0;
  return {
    aov: pembeli? gmv/pembeli : 0,
    ctr: impresi? klik/impresi : 0,
    ctor: klik? pembeli/klik : 0,
    gpm: impresi? gmv/impresi*1000 : 0,
    eng: viewers? (likes+komentar)/viewers : 0,
    gmvjam: durasi? gmv/(durasi/60) : 0,
  };
}

async function doLogin(){
  const email=document.getElementById('email').value.trim().toLowerCase();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){alert('Isi email & password dulu ya.');return;}
  document.getElementById('loginBtn').textContent='Memproses...';
  document.getElementById('loginBtn').disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    const m=document.getElementById('loginMsg');
    m.textContent='Email atau password salah.'; m.style.color='#dc2626'; m.style.display='block';
    document.getElementById('loginBtn').textContent='Masuk'; document.getElementById('loginBtn').disabled=false;
    return;

  initApp(data.user.email.toLowerCase());
}

async function init(){
  const {data:{session}}=await sb.auth.getSession();

function initApp(email){
  ME = email;

  document.getElementById('topActions').innerHTML =
    `<button class="btn-ghost" onclick="sb.auth.signOut().then(()=>location.reload())">Keluar</button>`;

  else buildHost();
}

function attachCalcListeners(){
  ['f_gmv','f_pembeli','f_impresi','f_klik','f_viewers','f_likes','f_kom','f_durasi_jam','f_durasi_min'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.addEventListener('input',updateCalc);
  });
}
function updateCalc(){
  const v=id=>+document.getElementById(id).value||0;
  const r={gmv:v('f_gmv'),pembeli:v('f_pembeli'),impresi:v('f_impresi'),klik_produk:v('f_klik'),
           viewers:v('f_viewers'),likes:v('f_likes'),komentar:v('f_kom'),durasi_menit:v('f_durasi_jam')*60+v('f_durasi_min')};
  const d=derive(r);
  document.getElementById('c_aov').textContent = r.pembeli? rp(d.aov):'—';
  document.getElementById('c_ctr').textContent = r.impresi? pct(d.ctr):'—';
  document.getElementById('c_ctor').textContent = r.klik_produk? pct(d.ctor):'—';
  document.getElementById('c_gpm').textContent = r.impresi? rp(d.gpm):'—';
  document.getElementById('c_eng').textContent = r.viewers? pct(d.eng):'—';
  document.getElementById('c_gmvjam').textContent = r.durasi_menit? rp(d.gmvjam):'—';
}

async function submitPerforma(){
  const me=HOST_MAP[ME];
  const v=id=>document.getElementById(id).value;
  const n=id=>+document.getElementById(id).value||0;
  if(!v('f_tanggal')){alert('Pilih tanggal dulu.');return;}
  if(n('f_gmv')===0 && n('f_viewers')===0){alert('Minimal isi GMV atau Viewers.');return;}
  const payload={
    host:me.name, brand:me.brand, host_email:ME,
    tanggal:v('f_tanggal'), sesi:+v('f_sesi'),
    gmv:n('f_gmv'), pembeli:n('f_pembeli'), items:n('f_items'),
    viewers:n('f_viewers'), impresi:n('f_impresi'), klik_produk:n('f_klik'),
    avg_view_dur:n('f_avg'), durasi_menit:n('f_durasi_jam')*60+n('f_durasi_min'),
    followers_baru:n('f_foll'), likes:n('f_likes'), komentar:n('f_kom'),
  };
  const {error}=await sb.from('live_performance').insert([payload]);
  if(error){showToast('Gagal: '+error.message,'error');return;}
  showToast('Data sesi tersimpan!','success');
  ['f_gmv','f_pembeli','f_items','f_viewers','f_impresi','f_klik','f_avg','f_durasi_jam','f_durasi_min','f_foll','f_likes','f_kom'].forEach(id=>document.getElementById(id).value='');
  updateCalc();
  loadHostData();
}

// Shared performance view with month filter (host's own, or leader drilldown)
function renderPerformanceView(box, allData, label, ctx){
  ctx = ctx || ('pv_'+Math.random().toString(36).slice(2,8));
  // collect months present
  const months=[...new Set(allData.filter(r=>r.tanggal).map(r=>r.tanggal.slice(0,7)))].sort().reverse();
  const monthOpts=`<option value="">Semua bulan</option>`+months.map(m=>{const[y,mo]=m.split('-');return `<option value="${m}">${new Date(y,mo-1).toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</option>`}).join('');
  box.innerHTML = `<div class="filter-row"><label style="font-size:13px;color:var(--text2)">Periode:</label>
    <select id="mf_${ctx}">${monthOpts}</select></div><div id="body_${ctx}"></div>`;
  // stash data on the select for re-render
  const sel=document.getElementById('mf_'+ctx);
  sel.onchange=()=>renderPerfBody(ctx, allData, label, sel.value);
  renderPerfBody(ctx, allData, label, '');
}

  const box=document.getElementById('body_'+ctx);
  if(!data.length){ box.innerHTML='<p class="empty">Tidak ada data di bulan ini.</p>'; return; }
  const tot = data.reduce((a,r)=>{a.gmv+=+r.gmv||0;a.pembeli+=+r.pembeli||0;a.items+=+r.items||0;a.viewers+=+r.viewers||0;a.impresi+=+r.impresi||0;a.klik+=+r.klik_produk||0;a.likes+=+r.likes||0;a.kom+=+r.komentar||0;a.foll+=+r.followers_baru||0;return a;},{gmv:0,pembeli:0,items:0,viewers:0,impresi:0,klik:0,likes:0,kom:0,foll:0});
  const dTot = derive({gmv:tot.gmv,pembeli:tot.pembeli,impresi:tot.impresi,klik_produk:tot.klik,viewers:tot.viewers,likes:tot.likes,komentar:tot.kom,durasi_menit:0});

      <div class="stat"><div class="stat-l">Items / Sesi</div><div class="stat-v">${data.length?(tot.items/data.length).toFixed(1):'0'}</div></div>
    </div>
    <div class="grp-head">Metrik Konversi (dihitung otomatis)</div>

      <div class="stat"><div class="stat-l">CTR LIVE</div><div class="stat-v">${pct(dTot.ctr)}</div></div>
      <div class="stat"><div class="stat-l">CTOR</div><div class="stat-v">${pct(dTot.ctor)}</div></div>
      <div class="stat"><div class="stat-l">GPM</div><div class="stat-v">${rp(dTot.gpm)}</div></div>

    <div class="stats" style="margin-bottom:1.3rem">

let _editId=null;
function findSesi(id){ return [...myData, ...allPerf].find(r=>String(r.id)===String(id)); }

function openEditSesi(id){
  const r=findSesi(id);
  if(!r){ showToast('Data sesi tidak ditemukan.','error'); return; }
  _editId=id;
  const set=(i,v)=>{ const el=document.getElementById(i); if(el) el.value=(v==null?'':v); };
  set('e_tanggal', r.tanggal||'');
  document.getElementById('e_sesi').value=String(r.sesi||1);
  set('e_gmv',r.gmv); set('e_pembeli',r.pembeli); set('e_items',r.items);
  const m=+r.durasi_menit||0;
  set('e_durasi_jam', m?Math.floor(m/60):''); set('e_durasi_min', m? m%60 : '');
  set('e_viewers',r.viewers); set('e_impresi',r.impresi); set('e_klik',r.klik_produk);
  set('e_avg',r.avg_view_dur); set('e_foll',r.followers_baru); set('e_likes',r.likes); set('e_kom',r.komentar);
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){ document.getElementById('editModal').classList.remove('open'); _editId=null; }

async function saveEditSesi(){
  if(_editId==null) return;
  const v=id=>document.getElementById(id).value;
  const n=id=>+document.getElementById(id).value||0;
  if(!v('e_tanggal')){ alert('Tanggal tidak boleh kosong.'); return; }
  const payload={
    tanggal:v('e_tanggal'), sesi:+v('e_sesi'),
    gmv:n('e_gmv'), pembeli:n('e_pembeli'), items:n('e_items'),
    viewers:n('e_viewers'), impresi:n('e_impresi'), klik_produk:n('e_klik'),
    avg_view_dur:n('e_avg'), durasi_menit:n('e_durasi_jam')*60+n('e_durasi_min'),
    followers_baru:n('e_foll'), likes:n('e_likes'), komentar:n('e_kom'),
  };
  const {data,error}=await sb.from('live_performance').update(payload).eq('id',_editId).select();
  if(error){ showToast('Gagal menyimpan: '+error.message,'error'); return; }
  if(!data||!data.length){ showToast('Perubahan tidak tersimpan — akunmu belum punya izin edit (lihat catatan SQL).','error'); return; }
  showToast('Perubahan tersimpan!','success');
  closeEditModal();
  await afterPerfChange();
}

async function deleteSesi(id){
  const r=findSesi(id);
  const lbl = r? `${fmtTgl(r.tanggal)} · Sesi ${r.sesi} · ${rp(+r.gmv||0)}` : 'sesi ini';
  if(!confirm(`Hapus data ${lbl}?\nTindakan ini tidak bisa dibatalkan.`)) return;
  const {data,error}=await sb.from('live_performance').delete().eq('id',id).select();
  if(error){ showToast('Gagal menghapus: '+error.message,'error'); return; }
  if(!data||!data.length){ showToast('Tidak terhapus — akunmu belum punya izin hapus (lihat catatan SQL).','error'); return; }
  showToast('Sesi dihapus.','success');
  await afterPerfChange();
}

let pendingRows=[];
function parseFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      // find the input sheet (first sheet with 'Input' or just first)
      let sheetName=wb.SheetNames.find(n=>n.includes('Input'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
      processImport(rows);
    }catch(err){ showToast('Gagal baca file: '+err.message,'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function timeToMin(t){
  if(!t)return null;
  const m=String(t).match(/(\d{1,2}):(\d{2})/);
  if(!m)return null;
  return (+m[1])*60+(+m[2]);
}
function assignSesi(mins){
  if(mins<11*60)return 1;
  if(mins<14*60)return 2;
  if(mins<18*60)return 3;
  return 4;
}
function normDate(d){
  if(!d)return null;
  // accept 2026-05-01 or other; try Date parse
  const s=String(d).trim();
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  const dt=new Date(s); if(!isNaN(dt)) return dt.toISOString().slice(0,10);
  return null;
}

function processImport(rows){
  const brand=document.getElementById('impBrand').value;
  const pagiEmail=document.getElementById('impPagi').value;
  const soreEmail=document.getElementById('impSore').value;
  const pagi=ALL_HOSTS.find(h=>h.email===pagiEmail), sore=ALL_HOSTS.find(h=>h.email===soreEmail);

  // find header row: row containing 'Tanggal' and 'Waktu'
  let hi=rows.findIndex(r=>r&&r.some(c=>String(c).trim()==='Tanggal')&&r.some(c=>String(c).includes('Waktu')));
  if(hi<0){ showToast('Format tidak dikenali (tidak ada kolom Tanggal/Waktu).','error'); return; }
  const head=rows[hi].map(c=>String(c).replace(/\n/g,' ').trim());
  const col=name=>head.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const ci={ tgl:col('Tanggal'), wkt:col('Waktu'), dur:col('Durasi'), gmv:col('GMV'), pemb:col('Pembeli'),
    items:col('Items'), view:col('Viewers'), imp:col('Impresi'), klik:col('Klik'),
    avg:col('Avg Watch'), foll:col('Pengikut'), likes:col('Likes'), kom:col('Komentar') };

  const num=v=>{ if(v==null||v==='')return 0; const n=parseFloat(String(v).replace(/[^\d.-]/g,'')); return isNaN(n)?0:n; };
  pendingRows=[];
  let dropped=0;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i]; if(!r||!r[ci.tgl]||!r[ci.wkt])continue;
    const tanggal=normDate(r[ci.tgl]); const mins=timeToMin(r[ci.wkt]);
    if(!tanggal||mins==null)continue;
    const sesi=assignSesi(mins);
    const who = sesi<=2? pagi : sore;
    const gmv=num(r[ci.gmv]), viewers=num(r[ci.view]);
    if(gmv===0 && viewers===0){ dropped++; continue; }
    pendingRows.push({
      host:who.name, brand, host_email:who.email, tanggal, sesi,
      gmv, pembeli:num(r[ci.pemb]), items:num(r[ci.items]),
      viewers, impresi:num(r[ci.imp]), klik_produk:num(r[ci.klik]),
      avg_view_dur:num(r[ci.avg]), durasi_menit:num(r[ci.dur]),
      followers_baru:num(r[ci.foll]), likes:num(r[ci.likes]), komentar:num(r[ci.kom]),
    });
  }
  // preview
  const byHost={};
  pendingRows.forEach(p=>{byHost[p.host]=(byHost[p.host]||0)+1;});
  const summary=Object.entries(byHost).map(([h,c])=>`${h}: ${c} sesi`).join(' · ');
  document.getElementById('impPreview').innerHTML=`
    <div style="margin-top:16px;padding:14px;background:var(--goodbg);border:1px solid var(--goodbd);border-radius:var(--r)">
      <div style="font-weight:600;color:var(--good);margin-bottom:4px">✓ ${pendingRows.length} sesi siap diimport (${dropped} dilewati)</div>
      <div style="font-size:12px;color:var(--text2)">${summary}</div>
    </div>
    <div class="tbl-wrap" style="margin-top:12px"><div class="tbl-scroll"><table>
      <thead><tr><th>Tgl</th><th>Host</th><th>Sesi</th><th class="num">GMV</th><th class="num">Viewers</th><th class="num">Klik</th></tr></thead>
      <tbody>${pendingRows.slice(0,8).map(p=>`<tr><td>${fmtTgl(p.tanggal)}</td><td>${p.host}</td><td>S${p.sesi}</td><td class="num">${rp(p.gmv)}</td><td class="num">${p.viewers.toLocaleString('id-ID')}</td><td class="num">${p.klik_produk}</td></tr>`).join('')}</tbody>
    </table></div></div>
    ${pendingRows.length>8?`<div style="font-size:12px;color:var(--text3);margin:6px 0 12px">…dan ${pendingRows.length-8} sesi lainnya</div>`:'<div style="height:12px"></div>'}
    <button class="btn-accent" onclick="confirmImport()">Import ${pendingRows.length} Sesi ke Database</button>`;
}

async function confirmImport(){
  if(!pendingRows.length)return;
  if(!confirm(`Import ${pendingRows.length} sesi? Pastikan data belum pernah diimport sebelumnya (untuk hindari duplikat).`))return;
  showToast('Mengimport...','info');
  // insert in chunks of 50
  for(let i=0;i<pendingRows.length;i+=50){
    const chunk=pendingRows.slice(i,i+50);
    const {error}=await sb.from('live_performance').insert(chunk);
    if(error){showToast('Gagal di baris '+i+': '+error.message,'error');return;}
  }
  showToast(`Berhasil import ${pendingRows.length} sesi!`,'success');
  document.getElementById('impPreview').innerHTML='';
  pendingRows=[];
  loadDash();
}

function switchTabById(id){
  document.querySelectorAll('#tabs .tab').forEach((t,i)=>{
    t.classList.toggle('active', (id==='l-home'&&i===0)||(id==='l-dash'&&i===1)||(id==='l-import'&&i===2));
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function fillDateDropdown(id){
  const sel=document.getElementById(id); if(!sel)return;
  const today=new Date(); let html='';
  for(let i=0;i<30;i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    html+=`<option value="${iso}">${d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</option>`;
  }
  sel.innerHTML=html;
}
function fmtTgl(t){ if(!t)return'—'; const d=new Date(t+'T00:00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
